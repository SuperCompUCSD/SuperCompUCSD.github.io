<div id="worldmap" style="height: 500px; width: 100%;"></div>

<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/ol@7.4.0/ol.css"
/>
<script src="https://cdn.jsdelivr.net/npm/ol@7.4.0/dist/ol.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const projection = 'EPSG:4326';
  const worldExtent = [-180, -90, 180, 90];

  const view = new ol.View({
    projection: projection,
    center: [0, 0],
    zoom: 2,
    extent: worldExtent
  });

  const rasterLayer = new ol.layer.Tile({
    source: new ol.source.OSM()
  });

  const markerStyle = new ol.style.Style({
    image: new ol.style.Circle({
      radius: 6,
      fill: new ol.style.Fill({ color: 'black' }),
      stroke: new ol.style.Stroke({ color: 'gray', width: 2 })
    })
  });

  // 11 universities
  const locations = [
    { name: "Those Who Node / Penguin Warriors", school: "University of California, San Diego", lat: 32.7157, lng: -117.1611 },
    { name: "Aalborg Supercomputer Klub", school: "Aalborg University", lat: 57.0488, lng: 9.9217 },
    { name: "Crossroads Coders", school: "Indiana University / Purdue University", lat: 39.1653, lng: -86.5264 },
    { name: "Gigadawgs", school: "Mississippi State University", lat: 33.4524, lng: -88.7903 },
    { name: "Team Brazil Force", school: "Federal University of Pampa / Federal University of Rio de Janeiro / UNICAMP / Federal University of Santa Maria", lat: -31.3389, lng: -53.1019 },
    { name: "KU Supercomputing Club", school: "University of Kansas", lat: 38.9543, lng: -95.2558 },
    { name: "Not-So-Slow Slugs", school: "University of California, Santa Cruz", lat: 36.9914, lng: -122.0595 },
    { name: "NTHU", school: "National Tsing Hua University", lat: 24.8138, lng: 120.9675 },
    { name: "PlumJuice", school: "Sapienza University of Rome", lat: 41.9022, lng: 12.4962 },
    { name: "RAMbo Clements", school: "Clemson University / Coastal Carolina University", lat: 34.6834, lng: -82.8373 },
    { name: "Team Kent Ridge", school: "National University of Singapore", lat: 1.2966, lng: 103.7764 },
    { name: "Tech Titans", school: "University of Botswana", lat: -24.6586, lng: 25.9083 }
  ];

  const features = locations.map(loc => {
    const feature = new ol.Feature({
      geometry: new ol.geom.Point([loc.lng, loc.lat]),
      name: loc.name,
      school: loc.school
    });
    feature.setStyle(markerStyle);
    return feature;
  });

  const vectorLayer = new ol.layer.Vector({
    source: new ol.source.Vector({ features })
  });

  const map = new ol.Map({
    target: 'worldmap',
    layers: [rasterLayer, vectorLayer],
    view: view
  });

  // Tooltip overlay
  const tooltip = document.createElement('div');
  tooltip.classList.add('ol-tooltip');
  tooltip.style.background = 'white';
  tooltip.style.padding = '2px 6px';
  tooltip.style.borderRadius = '4px';
  tooltip.style.border = '1px solid black';
  tooltip.style.whiteSpace = 'nowrap';

  const overlay = new ol.Overlay({
    element: tooltip,
    offset: [10, 0],
    positioning: 'bottom-left'
  });
  map.addOverlay(overlay);

  // Show tooltip on hover
  map.on('pointermove', function (evt) {
    const feature = map.forEachFeatureAtPixel(evt.pixel, f => f);
    if (feature) {
      overlay.setPosition(evt.coordinate);
      tooltip.innerHTML =  `<b>Team: </b>${feature.get('name')} <br \> <b>School: </b>${feature.get('school')}`;
      tooltip.classList.add("visible");
    } else {
      tooltip.classList.remove("visible");
    }
  });

  // Fit map to all markers
  const extent = vectorLayer.getSource().getExtent();
  view.fit(extent, { padding: [50, 50, 50, 50], maxZoom: 4 });

  // Fix responsive container
  setTimeout(() => map.updateSize(), 100);
});
</script>
